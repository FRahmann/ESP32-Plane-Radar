; ESP32-C3 Super Mini + 1.28" round GC9A01 (240×240)
; Board in Arduino IDE: "ESP32C3 Dev Module" or "MakerGO ESP32 C3 SuperMini"

[env:supermini]
platform = espressif32@6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions/plane_radar.csv
extra_scripts = post:scripts/merge_firmware.py

; Anti-aliased VLW font (Noto Sans Bold 15, from TFT_eSPI smooth-font examples)
board_build.embed_files = data/ui_font.vlw

; USB serial over USB-C (Super Mini native USB)
build_flags =
  -std=gnu++17
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DWM_NODEBUG
  -DWM_MDNS

lib_deps =
  lovyan03/LovyanGFX@^1.2.7
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.4.2

; --- Waveshare ESP32-S3-LCD-1.85: ST77916 360×360 round (QSPI) ---
; Board in Arduino IDE: "ESP32S3 Dev Module" (16 MB flash, OPI PSRAM)
[env:s3lcd185]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions/plane_radar_16mb.csv
extra_scripts = post:scripts/merge_firmware.py

; ESP32-S3R8: 16 MB QIO flash + 8 MB OCTAL (OPI) PSRAM.
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi

; Anti-aliased VLW font (shared with the C3 build)
board_build.embed_files = data/ui_font.vlw

build_flags =
  -std=gnu++17
  -DRADAR_BOARD_S3LCD185
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DWM_NODEBUG
  -DWM_MDNS

; QSPI display support lives in the LovyanGFX develop branch (no QSPI in the
; ^1.2.7 release). Pin the git ref here; overrides the registry dep above.
lib_deps =
  https://github.com/lovyan03/LovyanGFX.git#develop
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.4.2
